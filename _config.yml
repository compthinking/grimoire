# Site settings
title: "Mark's Grimoire"
author: "Based on The Grimoire by Saph, thebombzen"
description:
  "A searchable D&D 5e spell list, sorted by class and level."
baseurl: "/dnd" # the subpath of your site, e.g. /blog/
url: "https://computationallythinking.com/dnd" # the base hostname & protocol for your site
source-url: "https://github.com/compthinking/grimoire/"
permalink: "/:categories/:title"
exclude: ['Gemfile', 'Gemfile.lock', 'Rakefile', 'README.md']

# Build settings
markdown: kramdown
highlighter: pygments

# Site defaults
defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      category: "spells"
